<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色拉霸機</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: linear-gradient(to bottom, #ffcc00, #ff6600);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      color: #fff;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px #000;
    }

    .machine-container {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .slot-machine {
      background: #222;
      border: 6px solid #ffd700;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 900px;
      padding: 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      font-size: 2rem;
      font-weight: bold;
      color: #ffeb3b;
    }

    /* slot + label */
    .slot-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .slot-label {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
    }

    .slot {
      background: #333;
      border: 4px solid #555;
      border-radius: 10px;
      padding: 20px;
      width: 200px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 2rem;
      overflow: hidden;
    }

    .lever {
      width: 40px;
      height: 200px;
      background: #444;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .lever::after {
      content: "";
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      background: red;
      border-radius: 50%;
      border: 4px solid #222;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
    }

    .lever.down::after {
      transform: translateX(-50%) translateY(20px);
    }

    .history {
      margin-top: 30px;
      width: 80%;
      max-width: 700px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      padding: 20px;
    }

    .history h2 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      text-align: center;
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .history-list li {
      margin: 5px 0;
      padding: 10px;
      border-bottom: 1px solid #555;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>角色拉霸機 🎰</h1>
  <div class="machine-container">
    <div class="slot-machine">
      <div class="slot-container">
        <div class="slot-label">角色</div>
        <div id="role" class="slot">???</div>
      </div>
      <div class="slot-container">
        <div class="slot-label">特質</div>
        <div id="trait" class="slot">???</div>
      </div>
      <div class="slot-container">
        <div class="slot-label">情節</div>
        <div id="story" class="slot">???</div>
      </div>
    </div>
    <div id="lever" class="lever"></div>
  </div>

  <div class="history">
    <h2>歷史紀錄</h2>
    <ul id="history-list" class="history-list"></ul>
  </div>

  <script>
    const roles = [
      "勇者","魔法師","忍者","騎士","刺客","國王","女王","村民","商人","盜賊",
      "學者","醫師","煉金術士","冒險者","海盜","船長","弓箭手","祭司","牧師","戰士",
      "獸人","精靈","矮人","巨人","龍騎士","妖精","惡魔","天使","幽靈","占卜師",
      "老師","大臣","市井小民","足球選手","棒球選手","鐵匠","警察","消防員","護理師","羽球選手",
      "巫師","科學家","電競選手","奧運裁判","捕手","病人","學生","考古學家","吟遊詩人","校長",
      "教練","田徑選手","廚師","畫家","將軍","士兵","敵人","長官","政府官員","市長",
      "聖騎士","狂戰士","德魯伊","死靈法師","幻術師","召喚師","狙擊手","神射手","魔物獵人","劍客",
      "武僧","僧侶","狼人","吸血鬼","妖狐","哥布林","史萊姆","人魚","海妖","魔王",
      "守衛","隨從","傭兵","領主","貴族","乞丐","奴隸","叛軍","密探","殺手",
      "保鑣","獵人","伐木工","礦工","農夫","漁夫","牧羊人","裁縫師","建築師","雕刻家",
      "音樂家","歌手","演員","導演","編劇","作家","詩人","記者","主播","攝影師",
      "飛行員","空服員","司機","車長","船員","潛水員","太空人","外星人","機器人","生化人",
      "駭客","工程師","程式設計師","律師","法官","檢察官","偵探","怪盜","黑手黨","幫派份子",
      "總裁","經理","秘書","會計師","推銷員","房仲","理髮師","美容師","按摩師","健身教練",
      "救生員","籃球選手","網球選手","游泳選手","體操選手","舉重選手","拳擊手","賽車手","攀岩者","探險家",
      "導遊","翻譯員","外交官","總統","首相","議員","間諜","特務","典獄長","獄卒",
      "囚犯","逃犯","瘋子","賭徒","酒保","服務生","清潔工","郵差","送貨員","保全",
      "禮儀師","獸醫","牙醫","藥劑師","心理醫生","魔術師","小丑","雜耍藝人","舞者","DJ",
      "偶像","粉絲","網紅","實況主","系統管理員","美術設計師","動畫師","聲優","編輯","出版商",
      "鑑定師","拍賣官","管家","女僕","保母","園丁","馴獸師","魔藥學家","符文師","發明家"
    ];
    const traits = [
      "勇敢","膽小","狡猾","正直","懶惰","勤奮","衝動","冷靜","傲慢","謙遜",
      "樂觀","悲觀","多疑","忠誠","背叛","熱情","冷酷","機智","愚笨","仁慈",
      "殘忍","孤僻","外向","優柔寡斷","果斷","嫉妒","寬容","堅強","脆弱","固執",
      "善良","內向","充滿好奇心","剛正不阿","貪財","直率","耿直","溫文儒雅","善妒","神秘",
      "活潑","穩重","輕浮","嚴肅","幽默","刻薄","體貼","粗心","細心","暴躁",
      "溫和","虛榮","務實","浪漫","現實","隨和","挑剔","自私","無私","虛偽",
      "真誠","狂妄","自卑","自信","堅韌","散漫","嚴謹","隨性","執著","健忘",
      "記仇","圓滑","笨拙","靈活","呆板","敏感","遲鈍","順從","叛逆","守舊",
      "前衛","豪爽","小氣","慷慨","吝嗇","坦誠","憂鬱","開朗","沉著","急躁",
      "神經質","善解人意","獨斷獨行","寬宏大量","斤斤計較","優雅","粗魯","世故","單純","天真"
      "故步自封","固執","纏人","煩人","杞人憂天","落落大方","容易緊張","情緒化","邪惡","衝動"
    ];
    const stories = [
      "拯救公主","探索迷宮","擊敗惡龍","奪回王位","尋找寶藏","守護村莊","逃離詛咒","踏上旅程","結交同伴","建立王國",
      "挑戰競技場","尋找真相","對抗黑暗勢力","封印魔王","破解古代遺跡","探索未知大陸","復仇之路","拯救摯友","穿越時空","追尋夢想",
      "保護聖物","抵禦外敵","暗殺目標","追捕逃犯","贖回榮譽","守護家人","傳遞密令","尋找師父","探索深海","在沙漠中探險",
      "上數學課","出外踏查","研究古蹟","進行重大手術","買賣商品","寫作業","遞送信件","觀察昆蟲","打沙灘排球","進入甲子園",
      "處理學生糾紛","準備校慶表演","帶領校外教學","舉辦家長座談","批改期末考卷","創作暢銷小說","舉辦個人畫展","修復古董文物","參加化妝舞會","解除天大誤會",
      "參加世界盃","爭奪世界冠軍","踢進致勝一球","參加電競決賽","研發新型疫苗","拍攝紀錄片","經營深夜食堂","逃離無人島","破解密室殺人","調查神秘失蹤",
      "搭乘新幹線","參拜古老神社","參加夏日祭典","品嚐道地拉麵","潛入秘密基地","探索廢棄醫院","挑戰極限運動","尋找失散親人","參加歌唱選秀","拍攝電影大片",
      "策劃宮廷政變","簽署和平條約","建立貿易航線","繪製世界地圖","建立海上霸權","發展帝國版圖","召喚古代英靈","修正歷史偏差","研發魔法藥劑","對抗末日危機"
    ];

    const lever = document.getElementById("lever");
    const historyList = document.getElementById("history-list");
    let history = [];

    function spin() {
      // 拉桿動畫
      lever.classList.add("down");
      setTimeout(() => lever.classList.remove("down"), 500);

      // 亂數抽取
      const role = roles[Math.floor(Math.random() * roles.length)];
      const trait = traits[Math.floor(Math.random() * traits.length)];
      const story = stories[Math.floor(Math.random() * stories.length)];

      // 更新主畫面
      document.getElementById("role").textContent = role;
      document.getElementById("trait").textContent = trait;
      document.getElementById("story").textContent = story;

      // 更新歷史紀錄（最多 3 筆，最新在最上面）
      history.unshift(`${role} - ${trait} - ${story}`);
      if (history.length > 3) history.pop();

      updateHistory();
    }

    function updateHistory() {
      const historyList = document.getElementById("history-list");
      historyList.innerHTML = "";
      const labels = ["第三次", "第二次", "第一次"];
      history.forEach((item, index) => {
        const li = document.createElement("li");
        li.textContent = `${labels[index]}：${item}`;
        historyList.appendChild(li);
      });
    }

    lever.addEventListener("click", spin);
  </script>
</body>
</html>
